spring:
  application:
    name: twin-carbon
  config:
    import: classpath:application-carbon.yml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/twin-carbon?currentSchema=public
    username: postgres
    password: 123456
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.test.twincarbonboot.utils
  configuration:
    map-underscore-to-camel-case: true


