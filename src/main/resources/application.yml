spring:
  application:
    name: twin-carbon
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/twin-carbon?currentSchema=public
    username: postgres
    password: 123456
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.test.twincarbonboot.utils
  configuration:
    map-underscore-to-camel-case: true

carbon:
  scene-url: http://localhost:8090/iserver/services/3D-xxxx/rest/realspace
